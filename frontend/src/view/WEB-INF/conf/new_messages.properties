en.logon.offline.versionHeadline=EMM Version: Amethyst (26.05)
de.logon.offline.versionHeadline=EMM Version: Amethyst (26.05)
DELETE.logon.offline.versionText
en.logon.offline.versionText=EMM 26.05 is named after the amethyst. Amethyst comes in various shades of violet and is commonly found in Brazil, Uruguay, Madagascar, and Zambia. The name 'amethystos' was given to it in Greece and means 'not drunk.' The ancient Greeks believed the stone could protect against drunkenness. Today, amethyst is often said to improve sleep.
de.logon.offline.versionText=Der EMM 26.05 ist nach dem Amethyst benannt. Amethyst kommt in verschiedenen Violett-T\u00F6nen vor und wird h\u00E4ufig in Brasilien, Uruguay, Madagaskar oder Sambia gefunden. Der Name "amethystos" wurde ihm in Griechenland gegeben und bedeutet soviel wie "nicht betrunken". Die alten Griechen glaubten, der Stein k\u00F6nne vor Trunkenheit sch\u00FCtzen. Heute wird dem Amethyst oft nachgesagt,dass er den Schlaf verbessern kann.
en.error.mailing.content.illegal.script.type=The mailing contains script elements with missing or unsupported type. Only type="application/ld+json" is allowed in mailings. Therefore, this cannot be saved. Please modify the content accordingly.
de.error.mailing.content.illegal.script.type=Der Inhalt enth\u00E4lt Script-Elemente mit fehlendem oder nicht unterst\u00FCtztem Typ. In Mailings ist ausschlie\u00DFlich type="application/ld+json" erlaubt. Daher kann dies nicht gespeichert werden. Bitte \u00E4ndern Sie den Inhalt entsprechend ab.
es.error.mailing.content.illegal.script.type=El contenido contiene elementos de script con tipo faltante o no admitido. En los correos solo se permite type="application/ld+json". Por lo tanto, esto no se puede guardar. Por favor, cambie el contenido en consecuencia.
fr.error.mailing.content.illegal.script.type=Le contenu contient des \u00E9l\u00E9ments de script avec un type manquant ou non pris en charge. Dans les envois postaux, seul type="application/ld+json" est autoris\u00E9. Par cons\u00E9quent, cela ne peut pas \u00EAtre sauvegard\u00E9. Veuillez modifier le contenu en cons\u00E9quence.
it.error.mailing.content.illegal.script.type=Il contenuto contiene elementi script con tipo mancante o non supportato. Nelle mailing \u00E8 consentito solo type="application/ld+json". Pertanto, questo non pu\u00F2 essere salvato. Si prega di modificare il contenuto di conseguenza.
nl.error.mailing.content.illegal.script.type=De inhoud bevat scriptelementen met ontbrekend of niet-ondersteund type. In mailings is alleen type="application/ld+json" toegestaan. Daarom kan dit niet worden opgeslagen. Wijzig de inhoud dienovereenkomstig.
pt.error.mailing.content.illegal.script.type=O conte\u00FAdo cont\u00E9m elementos de script com tipo ausente ou n\u00E3o suportado. Em envios postais, apenas type="application/ld+json" \u00E9 permitido. Portanto, isso n\u00E3o pode ser salvo. Por favor, altere o conte\u00FAdo de acordo.

